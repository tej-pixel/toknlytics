<section class="start" id="start">
  <div class="wrap">
    <div class="start-card reveal">
      <span class="eyebrow eco light" style="justify-content:center;">Early access</span>
      <h2>{h2}</h2>
      <p>{p}</p>
      <form class="start-form" id="startForm" data-kind="{kind}" novalidate>
        <input type="email" id="startEmail" placeholder="you@company.com" aria-label="Email" required />
        <button type="submit" class="btn btn-primary btn-lg">{cta}</button>
      </form>
      <div class="start-success" id="startSuccess">&#127807; Almost there &mdash; your mail app just opened with the request ready. Hit send and you're on the early-access list.</div>
      <div class="start-meta">No spam &middot; no card &middot; we never share your email</div>
    </div>
  </div>
</section>
